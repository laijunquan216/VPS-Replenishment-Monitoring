<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPS 补货监控面板</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>VPS 补货监控面板</h1>
      <p class="hint">支持多站点规则，适配 VMISS / MadcityServers 等网页结构。</p>
      <div class="toolbar">
        <button id="startBtn">开始轮询</button>
        <button id="stopBtn">停止轮询</button>
        <button id="checkBtn">立即检测</button>
        <button id="reloadBtn">重载配置</button>
      </div>
      <section>
        <h2>当前状态</h2>
        <div id="meta"></div>
      </section>
      <section>
        <h2>检测结果</h2>
        <table>
          <thead>
            <tr>
              <th>站点</th><th>产品</th><th>状态</th><th>原因</th><th>时间</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
      <section>
        <h2>最近错误</h2>
        <pre id="errors">暂无</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
